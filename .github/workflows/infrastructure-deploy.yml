name: Infrastructure Deploy

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/infrastructure-deploy.yml"
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/infrastructure-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: starttech-infrastructure
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      TF_VAR_node_instance_types: ${{ vars.TF_VAR_NODE_INSTANCE_TYPES }}
      TF_IN_AUTOMATION: true
      TF_INPUT: false
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_INFRASTRUCTURE_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform format
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: >-
          terraform init
          -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}"
          -backend-config="key=starttech-infra/terraform.tfstate"
          -backend-config="region=${AWS_REGION}"
          -backend-config="use_lockfile=true"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -out=starttech.tfplan

      - name: Terraform apply
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve starttech.tfplan
